<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Banner</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Segoe UI', Inter, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ad-container {
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.6);
            border-radius: 12px;
            border: 1px dashed #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8b949e;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .ad-container:hover {
            border-color: #58a6ff;
            color: #c9d1d9;
            background: rgba(13, 17, 23, 0.8);
        }
        .ad-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .ad-desc {
            font-size: 11px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- 
    ====== ADSENSE YERLEŞTİRME KILAVUZU ======
    1. Aşağıdaki div (.ad-container) etiketini tamamen SİLİN.
    2. Google AdSense'den aldığınız <script> taglerini bu satıra YAPIŞTIRIN.
    ===========================================
    -->

    <div class="ad-container">
        <div class="ad-title">Reklam Alanı</div>
        <div class="ad-desc">Buraya AdSense veya AdMob kodlarınızı yerleştirebilirsiniz. (ad_banner.html dosyasını düzenleyin)</div>
    </div>

</body>
</html>
